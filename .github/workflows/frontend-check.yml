name: 常规前端检查

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
      node-version:
        required: false
        type: string
        default: "22"
      pnpm-version:
        required: false
        type: string
        default: "10.15.1"
      cache-dependency-path:
        required: false
        type: string
        default: "**/pnpm-lock.yaml"
      changed-paths:
        required: false
        type: string
        default: |
          **/*
      ignored-paths:
        required: false
        type: string
        default: ""
      always-run-paths:
        required: false
        type: string
        default: ""
      predicate-quantifier:
        required: false
        type: string
        default: some
      install-command:
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      playwright-browsers:
        required: false
        type: string
        default: ""
      check-command:
        required: false
        type: string
        default: "pnpm run lint"
      skip-draft-pr:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

jobs:
  frontend:
    name: 常规前端检查
    runs-on: ubuntu-latest
    steps:
      - name: 准备路径过滤配置
        id: filter-config
        if: (github.event_name == 'pull_request' || github.event_name == 'push') && (inputs.skip-draft-pr == false || github.event_name != 'pull_request' || github.event.pull_request.draft == false)
        env:
          CHANGED_PATHS: ${{ inputs.changed-paths }}
          IGNORED_PATHS: ${{ inputs.ignored-paths }}
          ALWAYS_RUN_PATHS: ${{ inputs.always-run-paths }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import os

          def patterns(name):
              for pattern in os.environ[name].splitlines():
                  pattern = pattern.strip()
                  if pattern:
                      yield pattern

          print("filters<<EOF")
          print("changed:")
          for pattern in patterns("CHANGED_PATHS"):
              print(f"  - {pattern!r}")
          for pattern in patterns("IGNORED_PATHS"):
              print(f"  - '!{pattern}'")
          always_patterns = list(patterns("ALWAYS_RUN_PATHS"))
          if always_patterns:
              print("always:")
          for pattern in always_patterns:
              print(f"  - {pattern!r}")
          print("EOF")
          PY

      - uses: actions/checkout@v6
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - name: 检查是否有前端相关改动
        id: check
        uses: dorny/paths-filter@v4
        if: (github.event_name == 'pull_request' || github.event_name == 'push') && (inputs.skip-draft-pr == false || github.event_name != 'pull_request' || github.event.pull_request.draft == false)
        with:
          filters: ${{ steps.filter-config.outputs.filters }}
          predicate-quantifier: ${{ inputs.predicate-quantifier }}
          token: ${{ github.token }}

      - name: 判断是否执行前端检查
        id: plan
        env:
          CHANGED_OUTPUT: ${{ steps.check.outputs.changed }}
          ALWAYS_OUTPUT: ${{ steps.check.outputs.always }}
        run: |
          set -euo pipefail

          if [ "${{ inputs.skip-draft-pr }}" = "true" ] &&
            [ "${{ github.event_name }}" = "pull_request" ] &&
            [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "草稿 PR 跳过前端检查，门禁返回成功。"
            exit 0
          fi

          if [ "${{ github.event_name }}" != "pull_request" ] && [ "${{ github.event_name }}" != "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$ALWAYS_OUTPUT" = "true" ] || [ "$CHANGED_OUTPUT" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "PR 无前端相关改动，跳过前端检查，门禁返回成功。"
          fi

      - uses: actions/checkout@v6
        if: steps.plan.outputs.run == 'true' && github.event_name != 'push'

      - name: 安装 pnpm
        if: steps.plan.outputs.run == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: 安装 Node.js
        if: steps.plan.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: 安装依赖
        if: steps.plan.outputs.run == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: 安装 Playwright 浏览器
        if: steps.plan.outputs.run == 'true' && inputs.playwright-browsers != ''
        working-directory: ${{ inputs.working-directory }}
        run: pnpm exec playwright install --with-deps ${{ inputs.playwright-browsers }}

      - name: 执行前端检查
        if: steps.plan.outputs.run == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.check-command }}

      - name: 跳过前端检查
        if: steps.plan.outputs.run != 'true'
        run: echo "无需执行前端检查。"
