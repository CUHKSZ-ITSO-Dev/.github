name: 常规开发镜像发布

on:
  workflow_call:
    inputs:
      service: {required: true, type: string}
      image-name: {required: true, type: string}
      dockerfile: {required: false, type: string, default: Dockerfile}
      context: {required: false, type: string, default: .}
      build-args: {required: false, type: string, default: ""}
      lfs-pull: {required: false, type: boolean, default: false}
    secrets:
      deploy-key: {required: true}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      kind: ${{ steps.plan.outputs.kind }}
      ref: ${{ steps.plan.outputs.ref }}
      commit: ${{ steps.plan.outputs.commit }}
      tag: ${{ steps.plan.outputs.tag }}
    steps:
      - id: plan
        env:
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          MERGE: ${{ github.event.pull_request.merge_commit_sha }}
          PR: ${{ github.event.pull_request.number }}
          SERVICE: ${{ inputs.service }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          kind=""
          ref=""
          commit=""
          # pull_request_target 使用具有包写权限的令牌。绝不能检出外部 fork
          # 的代码，否则不可信 PR 能借此取得发布权限。
          if test "$HEAD_REPOSITORY" != "$REPOSITORY"; then
            echo "忽略外部 fork 的开发发布请求" >&2
            { echo "kind="; echo "ref="; echo "commit="; echo "tag="; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if test "$ACTION" = closed && test "$MERGED" = true; then
            kind="main"; commit="$MERGE"; ref="$MERGE"
          elif test "$ACTION" = closed || { test "$ACTION" = unlabeled && ! jq -e 'index("auto-deploy-to-dev-server")' <<<"$LABELS" >/dev/null; }; then
            kind="restore"; commit="$HEAD"; ref="$HEAD"
          elif jq -e 'index("auto-deploy-to-dev-server")' <<<"$LABELS" >/dev/null; then
            kind="pr"; commit="$HEAD"; ref="$HEAD"
          fi
          { echo "kind=$kind"; echo "ref=$ref"; echo "commit=$commit"; } >> "$GITHUB_OUTPUT"
          test -z "$kind" || echo "tag=dev-${SERVICE}-${kind}-${PR}-${commit:0:7}" >> "$GITHUB_OUTPUT"

  request-build:
    needs: plan
    if: needs.plan.outputs.kind == 'pr' || needs.plan.outputs.kind == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - name: 申请短时 GitHub OIDC 身份令牌
        id: oidc
        run: |
          set -euo pipefail
          token=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=devportal.cuhk.edu.cn" | jq -r .value)
          test -n "$token" && test "$token" != null
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: 向开发集群提交构建请求
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          SERVICE: ${{ inputs.service }}
          REPOSITORY: ${{ github.repository }}
          COMMIT: ${{ needs.plan.outputs.commit }}
          IMAGE: ${{ format('{0}:{1}', inputs.image-name, needs.plan.outputs.tag) }}
          KIND: ${{ needs.plan.outputs.kind }}
          PR: ${{ github.event.pull_request.number }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          CONTEXT: ${{ inputs.context }}
          BUILD_ARGS: ${{ inputs.build-args }}
          LFS_PULL: ${{ inputs.lfs-pull }}
        run: |
          set -euo pipefail
          args='{}'
          while IFS= read -r line; do
            test -z "$line" && continue
            key=${line%%=*}
            value=${line#*=}
            test "$key" != "$line" || { echo "非法 build-arg：$line" >&2; exit 1; }
            args=$(jq --arg key "$key" --arg value "$value" '. + {($key): $value}' <<<"$args")
          done <<<"$BUILD_ARGS"
          name="${SERVICE}-${KIND}-${PR}-${COMMIT:0:7}"
          payload=$(jq -cn \
            --arg name "$name" --arg service "$SERVICE" --arg repository "$REPOSITORY" \
            --arg commit "$COMMIT" --arg image "$IMAGE" --arg kind "$KIND" \
            --arg dockerfile "$DOCKERFILE" --arg context "$CONTEXT" --argjson pr "$PR" --argjson buildArgs "$args" --argjson lfs "$LFS_PULL" \
            '{name:$name,service:$service,repository:$repository,commit:$commit,image:$image,kind:$kind,pr:$pr,dockerfile:$dockerfile,context:$context,buildArgs:$buildArgs,lfs:$lfs}')
          curl --fail --silent --show-error \
            -X POST https://testopenai-dev03.cuhk.edu.cn/dev/api/v1/builds \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H 'Content-Type: application/json' \
            --data "$payload"

  restore:
    needs: plan
    if: needs.plan.outputs.kind == 'restore'
    uses: CUHKSZ-ITSO-Dev/.github/.github/workflows/dev-release-request.yml@main
    with:
      service: ${{ inputs.service }}
      operation-id: ${{ needs.plan.outputs.kind }}-${{ github.run_id }}-${{ github.run_attempt }}
      kind: ${{ needs.plan.outputs.kind }}
      repository: ${{ github.repository }}
      commit-sha: ${{ needs.plan.outputs.commit }}
      image: ${{ needs.plan.outputs.kind == 'restore' && '' || format('{0}:{1}', inputs.image-name, needs.plan.outputs.tag) }}
      pr-number: ${{ github.event.pull_request.number }}
    secrets:
      deploy-key: ${{ secrets.deploy-key }}
