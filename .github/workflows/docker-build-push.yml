name: 常规 Docker 镜像构建

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      checkout-ref:
        required: false
        type: string
        default: ""
      version-tag:
        required: false
        type: string
        default: ""
      metadata-tags:
        required: false
        type: string
        default: ""
      metadata-labels:
        required: false
        type: string
        default: ""
      image-title:
        required: false
        type: string
        default: ""
      image-description:
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: linux/amd64
      build-args:
        required: false
        type: string
        default: ""
      push:
        required: false
        type: boolean
        default: true
      provenance:
        required: false
        type: boolean
        default: false
      cache-enabled:
        required: false
        type: boolean
        default: true
      semver-tags:
        required: false
        type: boolean
        default: true
      lfs-pull:
        required: false
        type: boolean
        default: false
      lfs-include:
        required: false
        type: string
        default: ""
      lfs-extra-include:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: 常规 Docker 镜像构建
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.sha }}
          lfs: ${{ inputs.lfs-pull }}

      - name: 拉取 Git LFS 文件
        if: inputs.lfs-pull
        env:
          LFS_INCLUDE: ${{ inputs.lfs-include }}
          LFS_EXTRA_INCLUDE: ${{ inputs.lfs-extra-include }}
        run: |
          set -euo pipefail
          if [ -n "$LFS_INCLUDE" ]; then
            git lfs pull --include="$LFS_INCLUDE"
          else
            git lfs pull
          fi
          if [ -n "$LFS_EXTRA_INCLUDE" ]; then
            git lfs pull --include="$LFS_EXTRA_INCLUDE"
          fi

      - name: 准备镜像元数据
        id: plan
        env:
          VERSION_TAG: ${{ inputs.version-tag }}
          METADATA_TAGS: ${{ inputs.metadata-tags }}
          METADATA_LABELS: ${{ inputs.metadata-labels }}
          IMAGE_TITLE: ${{ inputs.image-title }}
          IMAGE_DESCRIPTION: ${{ inputs.image-description }}
          SEMVER_TAGS: ${{ inputs.semver-tags }}
        run: |
          set -euo pipefail

          {
            echo "tags<<EOF"
            if [ -n "$METADATA_TAGS" ]; then
              printf '%s\n' "$METADATA_TAGS"
            else
              if [ -z "$VERSION_TAG" ]; then
                echo "::error::version-tag 和 metadata-tags 不能同时为空。"
                exit 1
              fi
              echo "type=raw,value=${VERSION_TAG}"
              if [ "$SEMVER_TAGS" = "true" ]; then
                echo "type=semver,pattern=v{{major}},enable=${{ github.event_name == 'push' }}"
                echo "type=semver,pattern=v{{major}}.{{minor}},enable=${{ github.event_name == 'push' }}"
              fi
            fi
            echo "EOF"

            echo "labels<<EOF"
            if [ -n "$METADATA_LABELS" ]; then
              printf '%s\n' "$METADATA_LABELS"
            fi
            if [ -n "$IMAGE_DESCRIPTION" ]; then
              echo "org.opencontainers.image.description=${IMAGE_DESCRIPTION}"
            fi
            echo "org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}"
            echo "org.opencontainers.image.revision={{sha}}"
            if [ -n "$VERSION_TAG" ]; then
              echo "org.opencontainers.image.version=${VERSION_TAG}"
            fi
            if [ -n "$IMAGE_TITLE" ]; then
              echo "org.opencontainers.image.title=${IMAGE_TITLE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: ${{ steps.plan.outputs.tags }}
          labels: ${{ steps.plan.outputs.labels }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          provenance: ${{ inputs.provenance }}
          build-args: ${{ inputs.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ inputs.cache-enabled && 'type=gha' || '' }}
          cache-to: ${{ inputs.cache-enabled && 'type=gha,mode=max' || '' }}
