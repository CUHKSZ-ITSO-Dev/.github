name: 开发槽位元数据

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      pr-number:
        required: true
        type: string
      commit-sha:
        required: true
        type: string
      base-sha:
        required: true
        type: string
      migration-directory:
        required: true
        type: string
    outputs:
      database-name:
        value: ${{ jobs.metadata.outputs.database-name }}
      manifest-sha256:
        value: ${{ jobs.metadata.outputs.manifest-sha256 }}
      migration-manifest:
        value: ${{ jobs.metadata.outputs.migration-manifest }}
      has-migration-changes:
        value: ${{ jobs.metadata.outputs.has-migration-changes }}
      migration-history-rewritten:
        value: ${{ jobs.metadata.outputs.migration-history-rewritten }}

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      database-name: ${{ steps.metadata.outputs.database-name }}
      manifest-sha256: ${{ steps.metadata.outputs.manifest-sha256 }}
      migration-manifest: ${{ steps.metadata.outputs.migration-manifest }}
      has-migration-changes: ${{ steps.metadata.outputs.has-migration-changes }}
      migration-history-rewritten: ${{ steps.metadata.outputs.migration-history-rewritten }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit-sha }}
          fetch-depth: 0
      - id: metadata
        env:
          SERVICE: ${{ inputs.service }}
          PR_NUMBER: ${{ inputs.pr-number }}
          BASE_SHA: ${{ inputs.base-sha }}
          COMMIT_SHA: ${{ inputs.commit-sha }}
          MIGRATION_DIRECTORY: ${{ inputs.migration-directory }}
        run: |
          set -euo pipefail
          case "$SERVICE" in
            chat|uniauth) ;;
            *) echo "不支持的开发槽位服务: $SERVICE" >&2; exit 1 ;;
          esac
          test -d "$MIGRATION_DIRECTORY"
          while IFS= read -r file; do
            name=${file##*/}
            case "$name" in
              *[!A-Za-z0-9_.-]*|'')
                echo "迁移文件名包含不安全字符: $file" >&2
                exit 1
                ;;
            esac
            case "$name" in
              [0-9][0-9][0-9][0-9][0-9][0-9]_*.up.sql|[0-9][0-9][0-9][0-9][0-9][0-9]_*.down.sql) ;;
              *) echo "迁移文件名不符合版本约定: $file" >&2; exit 1 ;;
            esac
          done < <(find "$MIGRATION_DIRECTORY" -maxdepth 1 -type f \( -name '*.up.sql' -o -name '*.down.sql' \) | LC_ALL=C sort)
          git cat-file -e "${BASE_SHA}^{commit}"
          if ! git merge-base --is-ancestor "$BASE_SHA" "$COMMIT_SHA"; then
            echo "PR 未包含当前 main；请先合入最新 main，再部署到共享开发主库。" >&2
            exit 1
          fi
          database_name="${SERVICE}_pr_${PR_NUMBER}"
          manifest_entries=$(find "$MIGRATION_DIRECTORY" -maxdepth 1 -type f \( -name '*.up.sql' -o -name '*.down.sql' \) -print0 | LC_ALL=C sort -z | xargs -0 shasum -a 256 | awk '{printf "%s:%s,", $2, $1}')
          base_manifest_entries=$(
            git ls-tree -r --name-only "$BASE_SHA" -- "$MIGRATION_DIRECTORY" |
              LC_ALL=C sort |
              while IFS= read -r file; do
                case "$file" in
                  *.up.sql|*.down.sql)
                    hash=$(git show "$BASE_SHA:$file" | shasum -a 256 | awk '{print $1}')
                    printf '%s:%s,' "$file" "$hash"
                    ;;
                esac
              done
          )
          if test "$manifest_entries" = "$base_manifest_entries"; then
            has_migration_changes=false
          else
            has_migration_changes=true
          fi
          migration_history_rewritten=false
          if test "$has_migration_changes" = true; then
            case "$manifest_entries" in
              "$base_manifest_entries"*) ;;
              *) migration_history_rewritten=true ;;
            esac
          fi
          manifest=$(printf '%s' "$manifest_entries" | shasum -a 256 | awk '{print $1}')
          {
            echo "database-name=$database_name"
            echo "manifest-sha256=$manifest"
            echo "migration-manifest=$manifest_entries"
            echo "has-migration-changes=$has_migration_changes"
            echo "migration-history-rewritten=$migration_history_rewritten"
          } >> "$GITHUB_OUTPUT"
