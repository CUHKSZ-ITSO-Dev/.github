name: 自动处理不活跃 PR

on:
  workflow_call:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale-pr:
    name: 处理不活跃 PR
    runs-on: ubuntu-latest
    steps:
      - name: 准备 PR 状态标签
        uses: actions/github-script@v8
        with:
          script: |
            const labels = [
              {
                name: "stale",
                color: "ededed",
                description: "超过指定时间无活动的 PR",
              },
              {
                name: "no-stale",
                color: "0e8a16",
                description: "暂不参与自动不活跃处理",
              },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });

                core.info(`已更新标签 ${label.name}。`);
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });

                core.info(`已创建标签 ${label.name}。`);
              }
            }

      - name: 标记并关闭不活跃 PR
        uses: actions/stale@v10
        with:
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 7
          days-before-pr-close: 7
          stale-pr-label: stale
          exempt-pr-labels: no-stale
          exempt-draft-pr: true
          remove-pr-stale-when-updated: true
          stale-pr-message: "该 PR 已超过 7 天无活动，已标记为 stale。若仍需继续，请留言、推送新提交，或添加 no-stale 标签；否则 7 天后将自动关闭。"
          close-pr-message: "该 PR 在标记 stale 后 7 天仍无活动，已自动关闭。如需继续，请重新打开并更新状态。"
          operations-per-run: 100
