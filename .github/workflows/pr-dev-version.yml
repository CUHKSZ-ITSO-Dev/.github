name: 常规 PR Dev 版本

on:
  workflow_call:
    inputs:
      prefix:
        required: false
        type: string
        default: pr
      environment:
        required: false
        type: string
        default: dev
      repository-slug:
        required: false
        type: string
        default: ""
      pr-number:
        required: false
        type: string
        default: ""
      head-sha:
        required: false
        type: string
        default: ""
      sha-length:
        required: false
        type: number
        default: 7
      run-suffix:
        required: false
        type: string
        default: ""
    outputs:
      version_tag:
        description: "生成的 PR dev 版本标签"
        value: ${{ jobs.version.outputs.version_tag }}

permissions:
  contents: read

jobs:
  version:
    name: 常规生成版本
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: 生成 PR dev 版本标签
        id: tag
        env:
          PREFIX: ${{ inputs.prefix }}
          ENVIRONMENT: ${{ inputs.environment }}
          REPOSITORY_SLUG: ${{ inputs.repository-slug }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr-number || github.event.pull_request.number }}
          HEAD_SHA: ${{ inputs.head-sha || github.event.pull_request.head.sha || github.sha }}
          SHA_LENGTH: ${{ inputs.sha-length }}
          RUN_SUFFIX: ${{ inputs.run-suffix }}
        run: |
          set -euo pipefail

          if [ -z "$PR_NUMBER" ]; then
            echo "::error::PR number 为空，无法生成 PR dev 版本标签。"
            exit 1
          fi

          short_sha="$(printf '%s' "$HEAD_SHA" | cut -c1-"$SHA_LENGTH")"
          repo_slug="$REPOSITORY_SLUG"
          if [ -z "$repo_slug" ]; then
            repo_slug="${SOURCE_REPOSITORY##*/}"
          fi
          repo_slug="$(
            printf '%s' "$repo_slug" |
              tr '[:upper:]' '[:lower:]' |
              sed -E 's/[^0-9a-z]+/-/g; s/^-+//; s/-+$//'
          )"
          if [ -z "$repo_slug" ]; then
            echo "::error::仓库 slug 为空，无法生成 PR dev 版本标签。"
            exit 1
          fi

          value="${ENVIRONMENT}-${repo_slug}-${PREFIX}-${PR_NUMBER}-${short_sha}"
          if [ -n "$RUN_SUFFIX" ]; then
            value="${value}-${RUN_SUFFIX}"
          fi
          echo "Generated version tag: ${value}"
          echo "value=${value}" >> "$GITHUB_OUTPUT"
