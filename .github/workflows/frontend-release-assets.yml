name: 常规前端制品发布

on:
  workflow_call:
    inputs:
      release-tag:
        required: true
        type: string
      checkout-ref:
        required: false
        type: string
        default: ""
      working-directory:
        required: false
        type: string
        default: "."
      node-version:
        required: false
        type: string
        default: "22"
      pnpm-version:
        required: false
        type: string
        default: ""
      cache-dependency-path:
        required: false
        type: string
        default: ""
      install-command:
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      check-command:
        required: false
        type: string
        default: ""
      build-command:
        required: false
        type: string
        default: "pnpm build"
      dist-dir:
        required: false
        type: string
        default: dist
      asset-prefix:
        required: false
        type: string
        default: ui-dist
      release-title:
        required: false
        type: string
        default: ""
      release-notes:
        required: false
        type: string
        default: ""
      prerelease:
        required: false
        type: boolean
        default: false
      prerelease-on-hyphen:
        required: false
        type: boolean
        default: true
      include-release-json:
        required: false
        type: boolean
        default: true
      version-page-enabled:
        required: false
        type: boolean
        default: false
      version-page-version:
        required: false
        type: string
        default: ""
      version-page-sha:
        required: false
        type: string
        default: ""
      version-page-source-url:
        required: false
        type: string
        default: ""
      version-page-source-label:
        required: false
        type: string
        default: ""
      version-page-timezone:
        required: false
        type: string
        default: Asia/Shanghai
      version-page-deploy-triggered-at:
        required: false
        type: string
        default: ""
      version-page-extra-service-name:
        required: false
        type: string
        default: ""
      version-page-extra-service-url:
        required: false
        type: string
        default: ""
    outputs:
      asset:
        description: "发布制品文件名"
        value: ${{ jobs.release.outputs.asset }}
      sha256:
        description: "发布制品 SHA256"
        value: ${{ jobs.release.outputs.sha256 }}

permissions:
  contents: write

jobs:
  release:
    name: 常规前端制品发布
    runs-on: ubuntu-latest
    outputs:
      asset: ${{ steps.package.outputs.asset }}
      sha256: ${{ steps.package.outputs.sha256 }}
    steps:
      - name: 校验 release tag
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "::error::release-tag 只能包含字母、数字、点、下划线和短横线，且必须以字母或数字开头。"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || inputs.release-tag }}

      - name: 安装 pnpm
        if: inputs.pnpm-version == ''
        uses: pnpm/action-setup@v6

      - name: 安装指定版本 pnpm
        if: inputs.pnpm-version != ''
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: 安装 Node.js
        if: inputs.cache-dependency-path == ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: 安装 Node.js 并配置缓存路径
        if: inputs.cache-dependency-path != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: 安装依赖
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: 执行发布前检查
        if: inputs.check-command != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.check-command }}

      - name: 构建前端
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: 生成版本页面
        if: inputs.version-page-enabled
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          DIST_DIR: ${{ inputs.dist-dir }}
          VERSION_PAGE_VERSION: ${{ inputs.version-page-version || inputs.release-tag }}
          VERSION_PAGE_SHA: ${{ inputs.version-page-sha || github.sha }}
          VERSION_PAGE_SOURCE_URL: ${{ inputs.version-page-source-url }}
          VERSION_PAGE_SOURCE_LABEL: ${{ inputs.version-page-source-label }}
          VERSION_PAGE_TIMEZONE: ${{ inputs.version-page-timezone }}
          VERSION_PAGE_DEPLOY_TRIGGERED_AT: ${{ inputs.version-page-deploy-triggered-at }}
          VERSION_PAGE_EXTRA_SERVICE_NAME: ${{ inputs.version-page-extra-service-name }}
          VERSION_PAGE_EXTRA_SERVICE_URL: ${{ inputs.version-page-extra-service-url }}
        run: |
          set -euo pipefail

          dist_path="${WORKING_DIRECTORY%/}/${DIST_DIR}"
          if [ ! -d "$dist_path" ]; then
            echo "::error::前端构建目录不存在：${dist_path}"
            exit 1
          fi

          export DIST_PATH="$dist_path"

          python3 <<'PY'
          import html
          import json
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          dist_path = Path(os.environ["DIST_PATH"])
          version = os.environ["VERSION_PAGE_VERSION"]
          sha = os.environ["VERSION_PAGE_SHA"]
          page_timezone = ZoneInfo(os.environ["VERSION_PAGE_TIMEZONE"])

          def format_time(value):
              value = value.strip()
              if not value:
                  return ""
              try:
                  parsed = datetime.fromisoformat(value.replace("Z", "+00:00"))
                  return parsed.astimezone(page_timezone).strftime("%Y-%m-%d %H:%M:%S")
              except ValueError:
                  return value

          built_at = datetime.now(page_timezone).strftime("%Y-%m-%d %H:%M:%S")
          deploy_triggered_at = format_time(os.environ["VERSION_PAGE_DEPLOY_TRIGGERED_AT"]) or built_at
          source_url = os.environ["VERSION_PAGE_SOURCE_URL"]
          source_label = os.environ["VERSION_PAGE_SOURCE_LABEL"] or source_url or "-"
          extra_service_name = os.environ["VERSION_PAGE_EXTRA_SERVICE_NAME"].strip()
          extra_service_url = os.environ["VERSION_PAGE_EXTRA_SERVICE_URL"].strip()
          if extra_service_url and not extra_service_name:
              extra_service_name = "关联服务"
          commit_url = ""
          if sha and os.environ.get("GITHUB_SERVER_URL") and os.environ.get("GITHUB_REPOSITORY"):
              commit_url = f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/commit/{sha}'

          link_html = (
              f'<a href="{html.escape(source_url, quote=True)}" rel="noreferrer">{html.escape(source_label)}</a>'
              if source_url
              else html.escape(source_label)
          )
          commit_html = (
              f'<a href="{html.escape(commit_url, quote=True)}" rel="noreferrer">{html.escape(sha)}</a>'
              if commit_url
              else html.escape(sha or "-")
          )
          primary_payload = {
              "状态": "已加载",
              "版本": version,
              "提交SHA": sha,
              "提交SHA链接": commit_url,
              "CI 触发时间": deploy_triggered_at,
              "构建时间": built_at,
              "拉取请求": source_label,
              "拉取请求链接": source_url,
          }
          version_payload_data = primary_payload
          if extra_service_url:
              version_payload_data = {
                  "前端 UI": primary_payload,
                  extra_service_name: {
                      "状态": "加载中",
                      "版本": "-",
                      "提交SHA": "-",
                      "提交SHA链接": "-",
                      "CI 触发时间": "-",
                      "构建时间": "-",
                      "拉取请求": "-",
                      "拉取请求链接": "-",
                  },
              }
          version_payload = json.dumps(
              version_payload_data,
              ensure_ascii=False,
              indent=2,
          )
          page_title = "Chat 开发服版本" if extra_service_url else "开发服版本"
          primary_heading = "前端 UI" if extra_service_url else "版本信息"
          extra_section_html = ""
          if extra_service_url:
              extra_section_html = f"""
                <section class="service-card" data-extra-service-url="{html.escape(extra_service_url, quote=True)}" data-extra-service-name="{html.escape(extra_service_name, quote=True)}">
                  <h2>{html.escape(extra_service_name)}</h2>
                  <dl>
                    <dt>状态</dt>
                    <dd id="extra-status">加载中</dd>
                    <dt>版本</dt>
                    <dd id="extra-version">-</dd>
                    <dt>提交SHA</dt>
                    <dd id="extra-sha">-</dd>
                    <dt>CI 触发时间</dt>
                    <dd id="extra-deploy-triggered-at">-</dd>
                    <dt>构建时间</dt>
                    <dd id="extra-built-at">-</dd>
                    <dt id="extra-effective-at-label" hidden>实际生效时间</dt>
                    <dd id="extra-effective-at" hidden>-</dd>
                    <dt>拉取请求</dt>
                    <dd id="extra-pr">-</dd>
                  </dl>
                </section>
              """

          version_html = f"""<!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>{html.escape(page_title)}</title>
              <style>
                body {{
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  background: #f6f8fb;
                  color: #172033;
                  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }}
                main {{
                  width: min(720px, calc(100vw - 32px));
                  padding: 28px;
                  border: 1px solid #d8dee9;
                  border-radius: 8px;
                  background: #ffffff;
                  box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
                }}
                h1 {{
                  margin: 0 0 20px;
                  font-size: 22px;
                }}
                h2 {{
                  margin: 0 0 14px;
                  font-size: 16px;
                }}
                .service-card {{
                  padding: 0 0 18px;
                  margin: 0 0 18px;
                  border-bottom: 1px solid #e2e8f0;
                }}
                .service-card:last-of-type {{
                  border-bottom: 0;
                }}
                dl {{
                  display: grid;
                  grid-template-columns: 120px 1fr;
                  gap: 12px 16px;
                  margin: 0 0 22px;
                }}
                dt {{
                  color: #64748b;
                  font-weight: 600;
                }}
                dd {{
                  margin: 0;
                  word-break: break-all;
                }}
                a {{
                  color: #155eef;
                }}
                pre {{
                  margin: 0;
                  padding: 16px;
                  overflow: auto;
                  border-radius: 6px;
                  background: #0f172a;
                  color: #e2e8f0;
                  font-size: 13px;
                  line-height: 1.6;
                }}
                .json-header {{
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  gap: 12px;
                  margin: 0 0 8px;
                  color: #64748b;
                  font-size: 13px;
                  font-weight: 600;
                }}
                button {{
                  border: 1px solid #cbd5e1;
                  border-radius: 6px;
                  background: #ffffff;
                  color: #172033;
                  cursor: pointer;
                  font: inherit;
                  padding: 6px 10px;
                }}
                button:hover {{
                  background: #f8fafc;
                }}
              </style>
            </head>
            <body>
              <main>
                <h1>{html.escape(page_title)}</h1>
                <section class="service-card">
                  <h2>{html.escape(primary_heading)}</h2>
                  <dl>
                    <dt>状态</dt>
                    <dd>已加载</dd>
                    <dt>版本</dt>
                    <dd>{html.escape(version)}</dd>
                    <dt>提交SHA</dt>
                    <dd>{commit_html}</dd>
                    <dt>CI 触发时间</dt>
                    <dd>{html.escape(deploy_triggered_at)}</dd>
                    <dt>构建时间</dt>
                    <dd>{html.escape(built_at)}</dd>
                    <dt id="primary-effective-at-label" hidden>实际生效时间</dt>
                    <dd id="primary-effective-at" hidden>-</dd>
                    <dt>拉取请求</dt>
                    <dd>{link_html}</dd>
                  </dl>
                </section>
                {extra_section_html}
                <div class="json-header">
                  <span>JSON</span>
                  <button type="button" id="copy-json">复制 JSON</button>
                </div>
                <pre id="version-json">{html.escape(version_payload)}</pre>
              </main>
              <script>
                (() => {{
                  let primaryPayload = {json.dumps(primary_payload, ensure_ascii=False)};
                  const extraServiceUrl = {json.dumps(extra_service_url, ensure_ascii=False)};
                  const extraServiceName = {json.dumps(extra_service_name, ensure_ascii=False)};
                  const emptyExtraPayload = (status) => ({{
                    "状态": status,
                    "版本": "-",
                    "提交SHA": "-",
                    "提交SHA链接": "-",
                    "CI 触发时间": "-",
                    "构建时间": "-",
                    "拉取请求": "-",
                    "拉取请求链接": "-"
                  }});
                  let payloadObject = extraServiceUrl
                    ? {{"前端 UI": primaryPayload, [extraServiceName]: emptyExtraPayload("加载中")}}
                    : primaryPayload;
                  let payload = JSON.stringify(payloadObject, null, 2);
                  const button = document.getElementById("copy-json");
                  const jsonNode = document.getElementById("version-json");
                  const setLabel = (text) => {{
                    if (!button) return;
                    button.textContent = text;
                    window.setTimeout(() => {{
                      button.textContent = "复制 JSON";
                    }}, 1600);
                  }};
                  const fallbackCopy = () => {{
                    const textarea = document.createElement("textarea");
                    textarea.value = payload;
                    textarea.setAttribute("readonly", "");
                    textarea.style.position = "fixed";
                    textarea.style.opacity = "0";
                    document.body.appendChild(textarea);
                    textarea.select();
                    const copied = document.execCommand("copy");
                    document.body.removeChild(textarea);
                    return copied;
                  }};
                  button?.addEventListener("click", async () => {{
                    try {{
                      if (navigator.clipboard?.writeText) {{
                        await navigator.clipboard.writeText(payload);
                      }} else if (!fallbackCopy()) {{
                        throw new Error("copy failed");
                      }}
                      setLabel("已复制");
                    }} catch {{
                      setLabel(fallbackCopy() ? "已复制" : "复制失败");
                    }}
                  }});
                  const setText = (id, value) => {{
                    const node = document.getElementById(id);
                    if (node) node.textContent = value || "-";
                  }};
                  const setOptionalText = (id, value) => {{
                    const node = document.getElementById(id);
                    const label = document.getElementById(id + "-label");
                    if (!node) return;
                    if (!value) {{
                      node.hidden = true;
                      if (label) label.hidden = true;
                      return;
                    }}
                    node.textContent = value;
                    node.hidden = false;
                    if (label) label.hidden = false;
                  }};
                  const setLink = (id, label, url) => {{
                    const node = document.getElementById(id);
                    if (!node) return;
                    node.textContent = "";
                    if (!url) {{
                      node.textContent = label || "-";
                      return;
                    }}
                    const anchor = document.createElement("a");
                    anchor.href = url;
                    anchor.rel = "noreferrer";
                    anchor.textContent = label || url;
                    node.appendChild(anchor);
                  }};
                  const refreshJson = () => {{
                    payload = JSON.stringify(payloadObject, null, 2);
                    if (jsonNode) jsonNode.textContent = payload;
                  }};
                  const pick = (data, ...keys) => {{
                    for (const key of keys) {{
                      if (data && data[key]) return data[key];
                    }}
                    return "";
                  }};
                  const formatPageTime = (value) => {{
                    if (!value) return "";
                    const date = new Date(value);
                    if (Number.isNaN(date.getTime())) return value;
                    const parts = new Intl.DateTimeFormat("zh-CN", {{
                      timeZone: "Asia/Shanghai",
                      year: "numeric",
                      month: "2-digit",
                      day: "2-digit",
                      hour: "2-digit",
                      minute: "2-digit",
                      second: "2-digit",
                      hour12: false
                    }}).formatToParts(date).reduce((acc, part) => {{
                      if (part.type !== "literal") acc[part.type] = part.value;
                      return acc;
                    }}, {{}});
                    return parts.year + "-" + parts.month + "-" + parts.day + " " + parts.hour + ":" + parts.minute + ":" + parts.second;
                  }};
                  const buildServicePayload = (values) => {{
                    const result = {{}};
                    result["状态"] = values.status || "已加载";
                    result["版本"] = values.version || "-";
                    result["提交SHA"] = values.sha || "-";
                    result["提交SHA链接"] = values.commitUrl || "-";
                    result["CI 触发时间"] = values.deployTriggeredAt || "-";
                    result["构建时间"] = values.builtAt || "-";
                    if (values.effectiveAt) result["实际生效时间"] = values.effectiveAt;
                    result["拉取请求"] = values.prLabel || "-";
                    result["拉取请求链接"] = values.prUrl || "-";
                    return result;
                  }};
                  const refreshPrimaryEffectiveAt = async () => {{
                    try {{
                      const targetUrl = window.location.href === "about:srcdoc" ? document.referrer : window.location.href;
                      if (!targetUrl) return;
                      const response = await fetch(targetUrl, {{
                        method: "HEAD",
                        credentials: "same-origin",
                        cache: "no-store"
                      }});
                      if (!response.ok) return;
                      const effectiveAt = formatPageTime(response.headers.get("Date"));
                      if (!effectiveAt) return;
                      setOptionalText("primary-effective-at", effectiveAt);
                      primaryPayload = buildServicePayload({{
                        status: primaryPayload["状态"],
                        version: primaryPayload["版本"],
                        sha: primaryPayload["提交SHA"],
                        commitUrl: primaryPayload["提交SHA链接"],
                        builtAt: primaryPayload["构建时间"],
                        deployTriggeredAt: primaryPayload["CI 触发时间"],
                        effectiveAt,
                        prLabel: primaryPayload["拉取请求"],
                        prUrl: primaryPayload["拉取请求链接"]
                      }});
                      payloadObject = extraServiceUrl
                        ? {{...payloadObject, "前端 UI": primaryPayload}}
                        : primaryPayload;
                      refreshJson();
                    }} catch {{
                      setOptionalText("primary-effective-at", "");
                    }}
                  }};
                  refreshPrimaryEffectiveAt();
                  if (extraServiceUrl) {{
                    fetch(extraServiceUrl, {{ credentials: "same-origin" }})
                      .then(async (response) => {{
                        if (!response.ok) throw new Error("HTTP " + response.status);
                        const effectiveAt = formatPageTime(response.headers.get("Date"));
                        const data = await response.json();
                        return {{ data, effectiveAt }};
                      }})
                      .then((result) => {{
                        const data = result.data || {{}};
                        const status = pick(data, "状态", "status") || "已加载";
                        const version = pick(data, "版本", "version");
                        const sha = pick(data, "提交SHA", "sha", "commitSha");
                        const builtAt = pick(data, "构建时间", "builtAt", "built_at");
                        const deployTriggeredAt = pick(data, "CI 触发时间", "部署触发时间", "deployTriggeredAt", "deploy_triggered_at");
                        const effectiveAt = pick(data, "实际生效时间", "effectiveAt", "effective_at") || result.effectiveAt;
                        const prLabel = pick(data, "拉取请求", "pullRequest", "pull_request");
                        const prUrl = pick(data, "拉取请求链接", "pullRequestUrl", "pull_request_url");
                        const commitUrl = pick(data, "提交SHA链接", "提交链接", "commitShaUrl", "commitUrl", "commit_url");
                        setText("extra-status", status);
                        setText("extra-version", version);
                        setLink("extra-sha", sha, commitUrl);
                        setText("extra-built-at", builtAt);
                        setText("extra-deploy-triggered-at", deployTriggeredAt);
                        setOptionalText("extra-effective-at", effectiveAt);
                        setLink("extra-pr", prLabel, prUrl);
                        payloadObject = {{
                          "前端 UI": primaryPayload,
                          [extraServiceName]: buildServicePayload({{
                            status,
                            version,
                            sha,
                            commitUrl,
                            builtAt,
                            deployTriggeredAt,
                            effectiveAt,
                            prLabel,
                            prUrl
                          }})
                        }};
                        refreshJson();
                      }})
                      .catch((error) => {{
                        const message = "加载失败：" + error.message;
                        setText("extra-status", message);
                        setOptionalText("extra-effective-at", "");
                        payloadObject = {{"前端 UI": primaryPayload, [extraServiceName]: emptyExtraPayload(message)}};
                        refreshJson();
                      }});
                  }}
                }})();
              </script>
            </body>
          </html>
          """

          output = dist_path / "version" / "index.html"
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(version_html, encoding="utf-8")

          index_file = dist_path / "index.html"
          if index_file.exists():
              version_html_literal = json.dumps(version_html, ensure_ascii=False).replace("</", "<\\/")
              fallback_script = f"""<script>
          (() => {{
            const path = window.location.pathname.replace(/\\/+$/, "");
            if (!/(^|\\/)version$/.test(path)) return;
            const html = {version_html_literal};
            const render = () => {{
              let frame = document.getElementById("__dev_version_page__");
              if (!frame) {{
                frame = document.createElement("iframe");
                frame.id = "__dev_version_page__";
                frame.title = "开发服版本";
                frame.style.cssText = "position:fixed;inset:0;width:100vw;height:100vh;border:0;z-index:2147483647;background:#f6f8fb;";
                document.documentElement.appendChild(frame);
              }}
              frame.srcdoc = html;
              document.title = "开发服版本";
            }};
            if (document.readyState === "loading") {{
              document.addEventListener("DOMContentLoaded", render, {{ once: true }});
            }}
            window.addEventListener("load", render, {{ once: true }});
            render();
            setTimeout(render, 50);
            setTimeout(render, 250);
            setTimeout(render, 1000);
          }})();
          </script>
          """
              content = index_file.read_text(encoding="utf-8")
              marker = "</head>"
              if marker in content:
                  content = content.replace(marker, f"{fallback_script}{marker}", 1)
              else:
                  content = f"{fallback_script}{content}"
              index_file.write_text(content, encoding="utf-8")
          PY

      - name: 打包发布制品
        id: package
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          DIST_DIR: ${{ inputs.dist-dir }}
          ASSET_PREFIX: ${{ inputs.asset-prefix }}
          INCLUDE_RELEASE_JSON: ${{ inputs.include-release-json }}
        run: |
          set -euo pipefail

          asset="${ASSET_PREFIX}-${RELEASE_TAG}.tar.gz"
          dist_path="${WORKING_DIRECTORY%/}/${DIST_DIR}"
          if [ ! -d "$dist_path" ]; then
            echo "::error::前端构建目录不存在：${dist_path}"
            exit 1
          fi

          (
            cd "$dist_path"
            find . -mindepth 1 -maxdepth 1 -print0 | tar --null -czf "$GITHUB_WORKSPACE/${asset}" --files-from -
          )

          sha256sum "$asset" | tee "${asset}.sha256"
          sha256="$(cut -d ' ' -f1 "${asset}.sha256")"

          if [ "$INCLUDE_RELEASE_JSON" = "true" ]; then
            cat > release.json <<JSON
          {
            "tag": "${RELEASE_TAG}",
            "assetName": "${asset}",
            "sha256": "${sha256}",
            "createdAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sourceRepository": "${GITHUB_REPOSITORY}",
            "sourceSha": "${GITHUB_SHA}"
          }
          JSON
          fi

          echo "asset=${asset}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          RELEASE_TITLE: ${{ inputs.release-title || inputs.release-tag }}
          RELEASE_NOTES: ${{ inputs.release-notes }}
          PRERELEASE: ${{ inputs.prerelease }}
          PRERELEASE_ON_HYPHEN: ${{ inputs.prerelease-on-hyphen }}
          ASSET: ${{ steps.package.outputs.asset }}
          SHA256: ${{ steps.package.outputs.sha256 }}
          INCLUDE_RELEASE_JSON: ${{ inputs.include-release-json }}
        run: |
          set -euo pipefail

          prerelease_flags=()
          if [ "$PRERELEASE" = "true" ] || { [ "$PRERELEASE_ON_HYPHEN" = "true" ] && [[ "$RELEASE_TAG" == *-* ]]; }; then
            prerelease_flags+=(--prerelease)
          fi

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="前端静态制品发布 ${RELEASE_TAG}

          Asset: ${ASSET}
          SHA256: ${SHA256}"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              "${prerelease_flags[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              "${prerelease_flags[@]}"
          fi

          upload_files=("$ASSET" "${ASSET}.sha256")
          if [ "$INCLUDE_RELEASE_JSON" = "true" ]; then
            upload_files+=(release.json)
          fi
          gh release upload "$RELEASE_TAG" "${upload_files[@]}" --clobber
