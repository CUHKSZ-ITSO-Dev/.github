name: 常规前端制品发布

on:
  workflow_call:
    inputs:
      release-tag:
        required: true
        type: string
      checkout-ref:
        required: false
        type: string
        default: ""
      working-directory:
        required: false
        type: string
        default: "."
      node-version:
        required: false
        type: string
        default: "22"
      pnpm-version:
        required: false
        type: string
        default: ""
      cache-dependency-path:
        required: false
        type: string
        default: ""
      install-command:
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      check-command:
        required: false
        type: string
        default: ""
      build-command:
        required: false
        type: string
        default: "pnpm build"
      dist-dir:
        required: false
        type: string
        default: dist
      asset-prefix:
        required: false
        type: string
        default: ui-dist
      release-title:
        required: false
        type: string
        default: ""
      release-notes:
        required: false
        type: string
        default: ""
      prerelease:
        required: false
        type: boolean
        default: false
      prerelease-on-hyphen:
        required: false
        type: boolean
        default: true
      include-release-json:
        required: false
        type: boolean
        default: true
      version-page-enabled:
        required: false
        type: boolean
        default: false
      version-page-version:
        required: false
        type: string
        default: ""
      version-page-sha:
        required: false
        type: string
        default: ""
      version-page-source-url:
        required: false
        type: string
        default: ""
      version-page-source-label:
        required: false
        type: string
        default: ""
      version-page-timezone:
        required: false
        type: string
        default: Asia/Shanghai
    outputs:
      asset:
        description: "发布制品文件名"
        value: ${{ jobs.release.outputs.asset }}
      sha256:
        description: "发布制品 SHA256"
        value: ${{ jobs.release.outputs.sha256 }}

permissions:
  contents: write

jobs:
  release:
    name: 常规前端制品发布
    runs-on: ubuntu-latest
    outputs:
      asset: ${{ steps.package.outputs.asset }}
      sha256: ${{ steps.package.outputs.sha256 }}
    steps:
      - name: 校验 release tag
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "::error::release-tag 只能包含字母、数字、点、下划线和短横线，且必须以字母或数字开头。"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || inputs.release-tag }}

      - name: 安装 pnpm
        if: inputs.pnpm-version == ''
        uses: pnpm/action-setup@v6

      - name: 安装指定版本 pnpm
        if: inputs.pnpm-version != ''
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: 安装 Node.js
        if: inputs.cache-dependency-path == ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: 安装 Node.js 并配置缓存路径
        if: inputs.cache-dependency-path != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: 安装依赖
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: 执行发布前检查
        if: inputs.check-command != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.check-command }}

      - name: 构建前端
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: 生成版本页面
        if: inputs.version-page-enabled
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          DIST_DIR: ${{ inputs.dist-dir }}
          VERSION_PAGE_VERSION: ${{ inputs.version-page-version || inputs.release-tag }}
          VERSION_PAGE_SHA: ${{ inputs.version-page-sha || github.sha }}
          VERSION_PAGE_SOURCE_URL: ${{ inputs.version-page-source-url }}
          VERSION_PAGE_SOURCE_LABEL: ${{ inputs.version-page-source-label }}
          VERSION_PAGE_TIMEZONE: ${{ inputs.version-page-timezone }}
        run: |
          set -euo pipefail

          dist_path="${WORKING_DIRECTORY%/}/${DIST_DIR}"
          if [ ! -d "$dist_path" ]; then
            echo "::error::前端构建目录不存在：${dist_path}"
            exit 1
          fi

          export DIST_PATH="$dist_path"

          python3 <<'PY'
          import html
          import json
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          dist_path = Path(os.environ["DIST_PATH"])
          version = os.environ["VERSION_PAGE_VERSION"]
          sha = os.environ["VERSION_PAGE_SHA"]
          built_at = datetime.now(ZoneInfo(os.environ["VERSION_PAGE_TIMEZONE"])).isoformat(timespec="seconds")
          source_url = os.environ["VERSION_PAGE_SOURCE_URL"]
          source_label = os.environ["VERSION_PAGE_SOURCE_LABEL"] or source_url or "-"

          link_html = (
              f'<a href="{html.escape(source_url, quote=True)}" rel="noreferrer">{html.escape(source_label)}</a>'
              if source_url
              else html.escape(source_label)
          )
          version_payload = json.dumps(
              {
                  "version": version,
                  "sha": sha,
                  "builtAt": built_at,
                  "pullRequest": source_url or "",
              },
              ensure_ascii=False,
              indent=2,
          )

          output = dist_path / "version" / "index.html"
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(f"""<!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Dev Version</title>
              <style>
                body {{
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  background: #f6f8fb;
                  color: #172033;
                  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }}
                main {{
                  width: min(720px, calc(100vw - 32px));
                  padding: 28px;
                  border: 1px solid #d8dee9;
                  border-radius: 8px;
                  background: #ffffff;
                  box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
                }}
                h1 {{
                  margin: 0 0 20px;
                  font-size: 22px;
                }}
                dl {{
                  display: grid;
                  grid-template-columns: 120px 1fr;
                  gap: 12px 16px;
                  margin: 0 0 22px;
                }}
                dt {{
                  color: #64748b;
                  font-weight: 600;
                }}
                dd {{
                  margin: 0;
                  word-break: break-all;
                }}
                a {{
                  color: #155eef;
                }}
                pre {{
                  margin: 0;
                  padding: 16px;
                  overflow: auto;
                  border-radius: 6px;
                  background: #0f172a;
                  color: #e2e8f0;
                  font-size: 13px;
                  line-height: 1.6;
                }}
              </style>
            </head>
            <body>
              <main>
                <h1>开发服版本</h1>
                <dl>
                  <dt>Version</dt>
                  <dd>{html.escape(version)}</dd>
                  <dt>Commit</dt>
                  <dd>{html.escape(sha)}</dd>
                  <dt>Built At</dt>
                  <dd>{html.escape(built_at)}</dd>
                  <dt>Pull Request</dt>
                  <dd>{link_html}</dd>
                </dl>
                <pre>{html.escape(version_payload)}</pre>
              </main>
            </body>
          </html>
          """, encoding="utf-8")
          PY

      - name: 打包发布制品
        id: package
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          DIST_DIR: ${{ inputs.dist-dir }}
          ASSET_PREFIX: ${{ inputs.asset-prefix }}
          INCLUDE_RELEASE_JSON: ${{ inputs.include-release-json }}
        run: |
          set -euo pipefail

          asset="${ASSET_PREFIX}-${RELEASE_TAG}.tar.gz"
          dist_path="${WORKING_DIRECTORY%/}/${DIST_DIR}"
          if [ ! -d "$dist_path" ]; then
            echo "::error::前端构建目录不存在：${dist_path}"
            exit 1
          fi

          (
            cd "$dist_path"
            find . -mindepth 1 -maxdepth 1 -print0 | tar --null -czf "$GITHUB_WORKSPACE/${asset}" --files-from -
          )

          sha256sum "$asset" | tee "${asset}.sha256"
          sha256="$(cut -d ' ' -f1 "${asset}.sha256")"

          if [ "$INCLUDE_RELEASE_JSON" = "true" ]; then
            cat > release.json <<JSON
          {
            "tag": "${RELEASE_TAG}",
            "assetName": "${asset}",
            "sha256": "${sha256}",
            "createdAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sourceRepository": "${GITHUB_REPOSITORY}",
            "sourceSha": "${GITHUB_SHA}"
          }
          JSON
          fi

          echo "asset=${asset}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          RELEASE_TITLE: ${{ inputs.release-title || inputs.release-tag }}
          RELEASE_NOTES: ${{ inputs.release-notes }}
          PRERELEASE: ${{ inputs.prerelease }}
          PRERELEASE_ON_HYPHEN: ${{ inputs.prerelease-on-hyphen }}
          ASSET: ${{ steps.package.outputs.asset }}
          SHA256: ${{ steps.package.outputs.sha256 }}
          INCLUDE_RELEASE_JSON: ${{ inputs.include-release-json }}
        run: |
          set -euo pipefail

          prerelease_flags=()
          if [ "$PRERELEASE" = "true" ] || { [ "$PRERELEASE_ON_HYPHEN" = "true" ] && [[ "$RELEASE_TAG" == *-* ]]; }; then
            prerelease_flags+=(--prerelease)
          fi

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="前端静态制品发布 ${RELEASE_TAG}

          Asset: ${ASSET}
          SHA256: ${SHA256}"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              "${prerelease_flags[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              "${prerelease_flags[@]}"
          fi

          upload_files=("$ASSET" "${ASSET}.sha256")
          if [ "$INCLUDE_RELEASE_JSON" = "true" ]; then
            upload_files+=(release.json)
          fi
          gh release upload "$RELEASE_TAG" "${upload_files[@]}" --clobber
