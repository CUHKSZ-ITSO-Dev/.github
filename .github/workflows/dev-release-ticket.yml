name: 开发发布队列票据

on:
  workflow_call:
    inputs:
      phase:
        description: reserve 在构建前预留，ready 在制品就绪后放行，fail 清理未就绪票据
        required: true
        type: string
      service:
        required: true
        type: string
      operation-id:
        required: true
        type: string
      sequence:
        description: GitHub Actions run_id，用于并发预留时保持事件单调顺序
        required: true
        type: number
      kind:
        required: true
        type: string
      pr-number:
        required: true
        type: string
      image-tag:
        required: false
        type: string
        default: ""
    secrets:
      deploy-key:
        required: true

permissions:
  contents: read

jobs:
  ticket:
    name: ${{ inputs.phase == 'reserve' && '预留开发发布顺序' || '标记开发发布就绪' }}
    uses: CUHKSZ-ITSO-Dev/.github/.github/workflows/gitops-yq-script-bump.yml@main
    with:
      repository: CUHKSZ-ITSO-Dev/Cluster
      ref: main
      update-script: |
        case '${{ inputs.service }}' in
          open-platform) file=gpt-platform-env/dev/units/open-platform.yaml; release_path=.openPlatform.devRelease ;;
          doubao) file=gpt-platform-env/dev/units/doubao.yaml; release_path=.doubaoSpeech.devRelease ;;
          websearch) file=gpt-platform-env/dev/units/websearch.yaml; release_path=.websearch.devRelease ;;
          rag) file=gpt-platform-env/dev/units/rag.yaml; release_path=.rag.devRelease ;;
          docintel) file=gpt-platform-env/dev/units/docintel.yaml; release_path=.docintel.devRelease ;;
          ui-cdn) file=gpt-platform-env/dev/units/ui-cdn.yaml; release_path=.uiCdn.devRelease ;;
          *) echo '不支持的开发发布服务' >&2; exit 1 ;;
        esac
        export RELEASE_PATH="$release_path" OPERATION_ID='${{ inputs.operation-id }}'
        phase='${{ inputs.phase }}'
        if test "$phase" = reserve; then
          case '${{ inputs.kind }}' in pr|main|restore) ;; *) echo '非法票据类型' >&2; exit 1 ;; esac
          exists=$(yq '[eval(strenv(RELEASE_PATH)).queue[]? | select(.id == strenv(OPERATION_ID))] | length' "$file")
          test "$exists" = 0 || exit 0
          export KIND='${{ inputs.kind }}' PR_NUMBER='${{ inputs.pr-number }}' SEQUENCE='${{ inputs.sequence }}' CREATED_AT="$(date -u +%s)"
          yq -i 'eval(strenv(RELEASE_PATH)).queue = (((eval(strenv(RELEASE_PATH)).queue // []) + [{"id": strenv(OPERATION_ID), "sequence": env(SEQUENCE), "kind": strenv(KIND), "prNumber": strenv(PR_NUMBER), "createdAt": env(CREATED_AT), "ready": false, "imageTag": ""}]) | sort_by(.sequence, .createdAt, .id))' "$file"
        elif test "$phase" = ready; then
          index=$(yq '(eval(strenv(RELEASE_PATH)).queue // [] | to_entries | map(select(.value.id == strenv(OPERATION_ID))) | .[0].key) // ""' "$file")
          test -n "$index" || { echo '开发发布票据不存在' >&2; exit 1; }
          export INDEX="$index" IMAGE_TAG='${{ inputs.image-tag }}'
          yq -i 'eval(strenv(RELEASE_PATH)).queue[env(INDEX)].imageTag = strenv(IMAGE_TAG) | eval(strenv(RELEASE_PATH)).queue[env(INDEX)].ready = true' "$file"
        elif test "$phase" = fail; then
          index=$(yq '(eval(strenv(RELEASE_PATH)).queue // [] | to_entries | map(select(.value.id == strenv(OPERATION_ID))) | .[0].key) // ""' "$file")
          test -n "$index" || exit 0
          FINISHED_AT="$(date -u +%s)"
          RECEIPT_CUTOFF="$(( $(date +%s) - 7 * 24 * 60 * 60 ))"
          export INDEX="$index" FINISHED_AT RECEIPT_CUTOFF
          yq -i 'del(eval(strenv(RELEASE_PATH)).queue[env(INDEX)]) | eval(strenv(RELEASE_PATH)).receipts = (((eval(strenv(RELEASE_PATH)).receipts // []) | map(select((.finishedAt // 0) >= env(RECEIPT_CUTOFF)))) + [{"id": strenv(OPERATION_ID), "status": "failed", "result": "preparation", "finishedAt": env(FINISHED_AT)}])' "$file"
        else
          echo '非法票据阶段' >&2
          exit 1
        fi
      commit-message: "chore(dev): ${{ inputs.service }} ${{ inputs.phase }} ${{ inputs.operation-id }}"
    secrets:
      deploy-key: ${{ secrets.deploy-key }}
