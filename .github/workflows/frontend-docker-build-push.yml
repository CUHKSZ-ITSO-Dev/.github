name: 常规前端 Docker 镜像构建

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      version-tag:
        required: true
        type: string
      working-directory:
        required: false
        type: string
        default: "."
      node-version:
        required: false
        type: string
        default: "22"
      pnpm-version:
        required: false
        type: string
        default: ""
      cache-dependency-path:
        required: false
        type: string
        default: ""
      install-command:
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      build-command:
        required: false
        type: string
        default: "pnpm build"
      metadata-labels:
        required: false
        type: string
        default: ""
      image-title:
        required: false
        type: string
        default: ""
      image-description:
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: linux/amd64
      provenance:
        required: false
        type: boolean
        default: false
      version-page-enabled:
        required: false
        type: boolean
        default: false
      version-page-version:
        required: false
        type: string
        default: ""
      version-page-sha:
        required: false
        type: string
        default: ""
      version-page-source-url:
        required: false
        type: string
        default: ""
      version-page-source-label:
        required: false
        type: string
        default: ""
      version-page-timezone:
        required: false
        type: string
        default: Asia/Shanghai
      dist-dir:
        required: false
        type: string
        default: dist

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: 常规前端 Docker 镜像构建
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 安装 pnpm
        if: inputs.pnpm-version == ''
        uses: pnpm/action-setup@v6

      - name: 安装指定版本 pnpm
        if: inputs.pnpm-version != ''
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: 安装 Node.js
        if: inputs.cache-dependency-path == ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: 安装 Node.js 并配置缓存路径
        if: inputs.cache-dependency-path != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: 安装依赖
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: 构建前端
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: 生成版本页面
        if: inputs.version-page-enabled
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          DIST_DIR: ${{ inputs.dist-dir }}
          VERSION_PAGE_VERSION: ${{ inputs.version-page-version || inputs.version-tag }}
          VERSION_PAGE_SHA: ${{ inputs.version-page-sha || github.sha }}
          VERSION_PAGE_SOURCE_URL: ${{ inputs.version-page-source-url }}
          VERSION_PAGE_SOURCE_LABEL: ${{ inputs.version-page-source-label }}
          VERSION_PAGE_TIMEZONE: ${{ inputs.version-page-timezone }}
        run: |
          set -euo pipefail

          dist_path="${WORKING_DIRECTORY%/}/${DIST_DIR}"
          if [ ! -d "$dist_path" ]; then
            echo "::error::前端构建目录不存在：${dist_path}"
            exit 1
          fi

          export DIST_PATH="$dist_path"

          python3 <<'PY'
          import html
          import json
          import os
          import subprocess
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          dist_path = Path(os.environ["DIST_PATH"])
          version = os.environ["VERSION_PAGE_VERSION"]
          sha = os.environ["VERSION_PAGE_SHA"]
          short_sha = sha[:7] if sha else "-"
          built_at = datetime.now(ZoneInfo(os.environ["VERSION_PAGE_TIMEZONE"])).strftime("%Y-%m-%d %H:%M:%S")
          source_url = os.environ["VERSION_PAGE_SOURCE_URL"]
          source_label = os.environ["VERSION_PAGE_SOURCE_LABEL"] or source_url or "-"
          commit_url = ""
          if sha and os.environ.get("GITHUB_SERVER_URL") and os.environ.get("GITHUB_REPOSITORY"):
              commit_url = f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/commit/{sha}'
          try:
              commit_subject = subprocess.check_output(
                  ["git", "show", "-s", "--format=%s", sha],
                  cwd=os.environ["GITHUB_WORKSPACE"],
                  text=True,
              ).strip()
          except Exception:
              commit_subject = ""
          commit_label = f"{commit_subject} ({short_sha})" if commit_subject else short_sha

          link_html = (
              f'<a href="{html.escape(source_url, quote=True)}" rel="noreferrer">{html.escape(source_label)}</a>'
              if source_url
              else html.escape(source_label)
          )
          commit_html = (
              f'<a href="{html.escape(commit_url, quote=True)}" rel="noreferrer">{html.escape(commit_label)}</a>'
              if commit_url
              else html.escape(commit_label)
          )
          version_payload = json.dumps(
              {
                  "版本": version,
                  "提交": commit_label,
                  "提交SHA": sha,
                  "构建时间": built_at,
                  "拉取请求": source_label,
              },
              ensure_ascii=False,
              indent=2,
          )

          version_html = f"""<!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>开发服版本</title>
              <style>
                body {{
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  background: #f6f8fb;
                  color: #172033;
                  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }}
                main {{
                  width: min(720px, calc(100vw - 32px));
                  padding: 28px;
                  border: 1px solid #d8dee9;
                  border-radius: 8px;
                  background: #ffffff;
                  box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
                }}
                h1 {{
                  margin: 0 0 20px;
                  font-size: 22px;
                }}
                dl {{
                  display: grid;
                  grid-template-columns: 120px 1fr;
                  gap: 12px 16px;
                  margin: 0 0 22px;
                }}
                dt {{
                  color: #64748b;
                  font-weight: 600;
                }}
                dd {{
                  margin: 0;
                  word-break: break-all;
                }}
                a {{
                  color: #155eef;
                }}
                pre {{
                  margin: 0;
                  padding: 16px;
                  overflow: auto;
                  border-radius: 6px;
                  background: #0f172a;
                  color: #e2e8f0;
                  font-size: 13px;
                  line-height: 1.6;
                }}
              </style>
            </head>
            <body>
              <main>
                <h1>开发服版本</h1>
                <dl>
                  <dt>版本</dt>
                  <dd>{html.escape(version)}</dd>
                  <dt>提交</dt>
                  <dd>{commit_html}</dd>
                  <dt>构建时间</dt>
                  <dd>{html.escape(built_at)}</dd>
                  <dt>拉取请求</dt>
                  <dd>{link_html}</dd>
                </dl>
                <pre>{html.escape(version_payload)}</pre>
              </main>
            </body>
          </html>
          """

          output = dist_path / "version" / "index.html"
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(version_html, encoding="utf-8")

          index_file = dist_path / "index.html"
          if index_file.exists():
              fallback_script = f"""<script>
          (() => {{
            const path = window.location.pathname.replace(/\\/+$/, "");
            if (!/(^|\\/)version$/.test(path)) return;
            const html = {json.dumps(version_html, ensure_ascii=False)};
            const render = () => {{
              let frame = document.getElementById("__dev_version_page__");
              if (!frame) {{
                frame = document.createElement("iframe");
                frame.id = "__dev_version_page__";
                frame.title = "开发服版本";
                frame.style.cssText = "position:fixed;inset:0;width:100vw;height:100vh;border:0;z-index:2147483647;background:#f6f8fb;";
                document.documentElement.appendChild(frame);
              }}
              frame.srcdoc = html;
              document.title = "开发服版本";
            }};
            if (document.readyState === "loading") {{
              document.addEventListener("DOMContentLoaded", render, {{ once: true }});
            }}
            window.addEventListener("load", render, {{ once: true }});
            render();
            setTimeout(render, 50);
            setTimeout(render, 250);
            setTimeout(render, 1000);
          }})();
          </script>
          """
              content = index_file.read_text(encoding="utf-8")
              marker = "</head>"
              if marker in content:
                  content = content.replace(marker, f"{fallback_script}{marker}", 1)
              else:
                  content = f"{fallback_script}{content}"
              index_file.write_text(content, encoding="utf-8")
          PY

      - name: 准备镜像元数据
        id: plan
        env:
          VERSION_TAG: ${{ inputs.version-tag }}
          METADATA_LABELS: ${{ inputs.metadata-labels }}
          IMAGE_TITLE: ${{ inputs.image-title }}
          IMAGE_DESCRIPTION: ${{ inputs.image-description }}
        run: |
          set -euo pipefail
          {
            echo "labels<<EOF"
            if [ -n "$METADATA_LABELS" ]; then
              printf '%s\n' "$METADATA_LABELS"
            fi
            if [ -n "$IMAGE_DESCRIPTION" ]; then
              echo "org.opencontainers.image.description=${IMAGE_DESCRIPTION}"
            fi
            echo "org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}"
            echo "org.opencontainers.image.revision={{sha}}"
            echo "org.opencontainers.image.version=${VERSION_TAG}"
            if [ -n "$IMAGE_TITLE" ]; then
              echo "org.opencontainers.image.title=${IMAGE_TITLE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ inputs.version-tag }}
            type=semver,pattern=v{{major}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
          labels: ${{ steps.plan.outputs.labels }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          provenance: ${{ inputs.provenance }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
