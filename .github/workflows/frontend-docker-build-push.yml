name: 常规前端 Docker 镜像构建

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      version-tag:
        required: true
        type: string
      working-directory:
        required: false
        type: string
        default: "."
      node-version:
        required: false
        type: string
        default: "22"
      pnpm-version:
        required: false
        type: string
        default: ""
      cache-dependency-path:
        required: false
        type: string
        default: ""
      install-command:
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      build-command:
        required: false
        type: string
        default: "pnpm build"
      metadata-labels:
        required: false
        type: string
        default: ""
      image-title:
        required: false
        type: string
        default: ""
      image-description:
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: linux/amd64
      provenance:
        required: false
        type: boolean
        default: false
      dist-dir:
        required: false
        type: string
        default: dist

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: 常规前端 Docker 镜像构建
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 安装 pnpm
        if: inputs.pnpm-version == ''
        uses: pnpm/action-setup@v6

      - name: 安装指定版本 pnpm
        if: inputs.pnpm-version != ''
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: 安装 Node.js
        if: inputs.cache-dependency-path == ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: 安装 Node.js 并配置缓存路径
        if: inputs.cache-dependency-path != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: 安装依赖
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: 构建前端
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: 准备镜像元数据
        id: plan
        env:
          VERSION_TAG: ${{ inputs.version-tag }}
          METADATA_LABELS: ${{ inputs.metadata-labels }}
          IMAGE_TITLE: ${{ inputs.image-title }}
          IMAGE_DESCRIPTION: ${{ inputs.image-description }}
        run: |
          set -euo pipefail
          {
            echo "labels<<EOF"
            if [ -n "$METADATA_LABELS" ]; then
              printf '%s\n' "$METADATA_LABELS"
            fi
            if [ -n "$IMAGE_DESCRIPTION" ]; then
              echo "org.opencontainers.image.description=${IMAGE_DESCRIPTION}"
            fi
            echo "org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}"
            echo "org.opencontainers.image.revision={{sha}}"
            echo "org.opencontainers.image.version=${VERSION_TAG}"
            if [ -n "$IMAGE_TITLE" ]; then
              echo "org.opencontainers.image.title=${IMAGE_TITLE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ inputs.version-tag }}
            type=semver,pattern=v{{major}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
          labels: ${{ steps.plan.outputs.labels }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          provenance: ${{ inputs.provenance }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
