name: 常规前端 Docker 镜像构建

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      version-tag:
        required: true
        type: string
      working-directory:
        required: false
        type: string
        default: "."
      node-version:
        required: false
        type: string
        default: "22"
      pnpm-version:
        required: false
        type: string
        default: ""
      cache-dependency-path:
        required: false
        type: string
        default: ""
      install-command:
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      build-command:
        required: false
        type: string
        default: "pnpm build"
      metadata-labels:
        required: false
        type: string
        default: ""
      image-title:
        required: false
        type: string
        default: ""
      image-description:
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: linux/amd64
      provenance:
        required: false
        type: boolean
        default: false
      version-page-enabled:
        required: false
        type: boolean
        default: false
      version-page-version:
        required: false
        type: string
        default: ""
      version-page-sha:
        required: false
        type: string
        default: ""
      version-page-source-url:
        required: false
        type: string
        default: ""
      version-page-source-label:
        required: false
        type: string
        default: ""
      version-page-timezone:
        required: false
        type: string
        default: Asia/Shanghai
      version-page-deploy-triggered-at:
        required: false
        type: string
        default: ""
      dist-dir:
        required: false
        type: string
        default: dist

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: 常规前端 Docker 镜像构建
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 安装 pnpm
        if: inputs.pnpm-version == ''
        uses: pnpm/action-setup@v6

      - name: 安装指定版本 pnpm
        if: inputs.pnpm-version != ''
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: 安装 Node.js
        if: inputs.cache-dependency-path == ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: 安装 Node.js 并配置缓存路径
        if: inputs.cache-dependency-path != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: 安装依赖
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.install-command }}

      - name: 构建前端
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}

      - name: 生成版本数据
        if: inputs.version-page-enabled
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          DIST_DIR: ${{ inputs.dist-dir }}
          VERSION_PAGE_VERSION: ${{ inputs.version-page-version || inputs.version-tag }}
          VERSION_PAGE_SHA: ${{ inputs.version-page-sha || github.sha }}
          VERSION_PAGE_SOURCE_URL: ${{ inputs.version-page-source-url }}
          VERSION_PAGE_SOURCE_LABEL: ${{ inputs.version-page-source-label }}
          VERSION_PAGE_TIMEZONE: ${{ inputs.version-page-timezone }}
          VERSION_PAGE_DEPLOY_TRIGGERED_AT: ${{ inputs.version-page-deploy-triggered-at }}
        run: |
          set -euo pipefail

          dist_path="${WORKING_DIRECTORY%/}/${DIST_DIR}"
          if [ ! -d "$dist_path" ]; then
            echo "::error::前端构建目录不存在：${dist_path}"
            exit 1
          fi

          export DIST_PATH="$dist_path"

          python3 <<'PY'
          import json
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          dist_path = Path(os.environ["DIST_PATH"])
          version = os.environ["VERSION_PAGE_VERSION"]
          sha = os.environ["VERSION_PAGE_SHA"]
          built_at = datetime.now(ZoneInfo(os.environ["VERSION_PAGE_TIMEZONE"])).strftime("%Y-%m-%d %H:%M:%S")
          triggered_at = os.environ["VERSION_PAGE_DEPLOY_TRIGGERED_AT"].strip()
          source_url = os.environ["VERSION_PAGE_SOURCE_URL"]
          source_label = os.environ["VERSION_PAGE_SOURCE_LABEL"] or source_url or "-"
          commit_url = ""
          if sha and os.environ.get("GITHUB_SERVER_URL") and os.environ.get("GITHUB_REPOSITORY"):
              commit_url = f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/commit/{sha}'

          version_data = {
              "状态": "已加载",
              "版本": version,
              "提交SHA": sha,
              "提交SHA链接": commit_url,
          }
          if triggered_at:
              version_data["CI 触发时间"] = triggered_at.replace("T", " ").split("+", 1)[0]
          version_data.update(
              {
                  "构建时间": built_at,
                  "拉取请求": source_label,
                  "拉取请求链接": source_url,
              }
          )
          version_payload = json.dumps(version_data, ensure_ascii=False, indent=2)
          (dist_path / "version-data.json").write_text(version_payload + "\n", encoding="utf-8")
          PY

      - name: 准备镜像元数据
        id: plan
        env:
          VERSION_TAG: ${{ inputs.version-tag }}
          METADATA_LABELS: ${{ inputs.metadata-labels }}
          IMAGE_TITLE: ${{ inputs.image-title }}
          IMAGE_DESCRIPTION: ${{ inputs.image-description }}
        run: |
          set -euo pipefail
          {
            echo "labels<<EOF"
            if [ -n "$METADATA_LABELS" ]; then
              printf '%s\n' "$METADATA_LABELS"
            fi
            if [ -n "$IMAGE_DESCRIPTION" ]; then
              echo "org.opencontainers.image.description=${IMAGE_DESCRIPTION}"
            fi
            echo "org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}"
            echo "org.opencontainers.image.revision={{sha}}"
            echo "org.opencontainers.image.version=${VERSION_TAG}"
            if [ -n "$IMAGE_TITLE" ]; then
              echo "org.opencontainers.image.title=${IMAGE_TITLE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ inputs.version-tag }}
            type=semver,pattern=v{{major}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
          labels: ${{ steps.plan.outputs.labels }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          provenance: ${{ inputs.provenance }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
