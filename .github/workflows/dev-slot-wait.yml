name: 确认开发槽位请求已提交

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      operation-id:
        required: true
        type: string
      timeout-seconds:
        required: false
        type: number
        default: 1800
    secrets:
      deploy-key:
        required: true

jobs:
  accepted:
    name: 发布请求已交给开发集群
    runs-on: ubuntu-latest
    steps:
      - name: 输出监控入口
        run: |
          set -euo pipefail
          echo "开发发布请求已提交：服务 ${{ inputs.service }}，操作 ${{ inputs.operation-id }}。"
          echo "后续队列、迁移、切换、回滚与错误回执由开发集群执行，请在 https://testopenai-dev03.cuhk.edu.cn/dev/ 查看实时状态。"
